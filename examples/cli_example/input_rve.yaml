scan_paths:
  - "../data/scanPathData/rve_layers/ULI_rve_layer_0.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_1.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_2.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_3.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_4.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_5.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_6.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_7.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_8.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_9.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_10.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_11.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_12.txt"
  - "../data/scanPathData/rve_layers/ULI_rve_layer_13.txt"

parameters:
  layer_height: 50.0e-6              # (meters)
  voxel_resolution: 5.0e-6           # (meters)
  enable_random_segment_phase: true # Default: true

melt_pool_data:
  width:
      type: "time_series"
      file_name: "../data/meltPoolData/ULI_v1700_theta0_widths.txt"
      nmodes: 50.
      scale: 1.0

  depth:
      type: "time_series"
      file_name: "../data/meltPoolData/ULI_v1700_theta0_widths.txt"
      nmodes: 50.
      scale: 0.71
      shape: 1.0    # parabola

  height:
      type: "time_series"
      file_name: "../data/meltPoolData/ULI_v1700_theta0_widths.txt"
      nmodes: 5.
      scale: 0.45
      shape: 2.0    # ellipse


rve:
  min_point: [0.0, 0.0, 0.0]
  max_point: [500.0e-6, 500.0e-6, 500.0e-6]

output:
  vtk:
    file_name: "ULI_porosity.vti"
  morphology:
    file_name: "ULI_morphology.csv"
    fields:
     - "area"
     - "equivalent_diameter_area"
